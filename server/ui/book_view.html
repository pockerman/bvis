<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>bvis-reader</title>
    <link rel="stylesheet" href="/static/book.css">

    <style>
        .hidden {
            display: none !important;
        }

        .typing {
            font-style: italic;
            color: #888;
            margin: 8px 0;
        }

        .dots::after {
            content: '';
            animation: dots 1.2s steps(4, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- LEFT: CHAPTER CONTENT -->
    <div id="content" class="content">
        <button class="toggle-btn" onclick="toggleChat()">💬 Chat</button>

        <div class="chapter">
            {{.ChapterHTML}}
        </div>
    </div>

    <!-- RIGHT: CHAT PANEL -->
    <div id="chat-panel" class="chat-panel">

        <div class="chat-header">
            <span>AI Assistant</span>
            <button onclick="toggleChat()">✖</button>
        </div>

        <div id="chat-messages" class="chat-messages"></div>

        <!-- typing indicator (hidden by default, JS controls it) -->
        <div id="typing-indicator" class="typing hidden">
            AI is thinking<span class="dots"></span>
        </div>

        <div class="chat-input">
            <textarea id="chat-input" placeholder="Ask something..."></textarea>
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>
</div>

<script>
window.bookID = "{{.BookID}}";
window.chapterID = "{{.ChapterID}}";

let chatOpen = true;

function toggleChat() {
    const panel = document.getElementById("chat-panel");
    const content = document.getElementById("content");

    chatOpen = !chatOpen;

    if (chatOpen) {
        panel.style.display = "flex";
        content.style.width = "50%";
    } else {
        panel.style.display = "none";
        content.style.width = "100%";
    }
}

/* ---------------------------
   Typing indicator helpers
----------------------------*/

function showTyping() {
    const el = document.getElementById("typing-indicator");
    el.classList.remove("hidden");
}

function hideTyping() {
    const el = document.getElementById("typing-indicator");
    el.classList.add("hidden");
}

/* ---------------------------
   Streaming chat
----------------------------*/

async function sendMessage() {
    const input = document.getElementById("chat-input");
    const messages = document.getElementById("chat-messages");

    const text = input.value;
    if (!text) return;

    messages.innerHTML += `<div class="message user">${text}</div>`;
    input.value = "";

    // show typing indicator immediately
    showTyping();

    const res = await fetch("/api/ai", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            book_id: window.bookID,
            chapter_id: window.chapterID,
            query: text
        })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let output = "";

    const aiDiv = document.createElement("div");
    aiDiv.className = "message ai";
    messages.appendChild(aiDiv);

    let lastRender = "";

    try {
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });

            // hide typing as soon as first token arrives
            hideTyping();

            output += chunk;

            // simple throttled render
            if (output !== lastRender) {
                aiDiv.innerText = output;
                lastRender = output;
            }
        }
    } finally {
        hideTyping();
        aiDiv.innerText = output;
    }
}

/* ---------------------------
   Safety init
----------------------------*/

window.addEventListener("DOMContentLoaded", () => {
    hideTyping();
});
</script>

</body>
</html>
